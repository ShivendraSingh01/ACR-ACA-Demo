services:
  backend:
    build:
      context: ./backend
    image: acr-aca-backend:local
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: 8080

  frontend:
    build:
      context: ./frontend
    image: acr-aca-frontend:local
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      BACKEND_URL: http://backend:8080
    depends_on:
      - backend

