services:
  backend:
    build:
      context: ./backend
    image: acr-aca-backend:local
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: production
      PORT: 8000

  frontend:
    build:
      context: ./frontend
    image: acr-aca-frontend:local
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
