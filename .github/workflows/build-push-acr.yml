name: Build and Push Images to ACR

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build and push frontend and backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login Docker to Azure Container Registry
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - name: Ensure Container Apps CLI extension
        run: az extension add --name containerapp --upgrade

      # - name: Validate target Container Apps
      #   run: |
      #     echo "Container Apps in resource group '${{ vars.AZURE_RESOURCE_GROUP }}':"
      #     az containerapp list \
      #       --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
      #       --query "[].{name:name, location:location}" \
      #       --output table

      #     az containerapp show \
      #       --name "${{ vars.BACKEND_CONTAINER_APP }}" \
      #       --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
      #       --query name \
      #       --output tsv >/dev/null

      #     az containerapp show \
      #       --name "${{ vars.FRONTEND_CONTAINER_APP }}" \
      #       --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
      #       --query name \
      #       --output tsv >/dev/null

      - name: Build and push backend image
        run: |
          docker build \
            -t "$ACR_LOGIN_SERVER/acr-aca-backend:$IMAGE_TAG" \
            -t "$ACR_LOGIN_SERVER/acr-aca-backend:latest" \
            ./backend

          docker push "$ACR_LOGIN_SERVER/acr-aca-backend:$IMAGE_TAG"
          docker push "$ACR_LOGIN_SERVER/acr-aca-backend:latest"

      - name: Build and push frontend image
        run: |
          docker build \
            -t "$ACR_LOGIN_SERVER/acr-aca-frontend:$IMAGE_TAG" \
            -t "$ACR_LOGIN_SERVER/acr-aca-frontend:latest" \
            ./frontend

          docker push "$ACR_LOGIN_SERVER/acr-aca-frontend:$IMAGE_TAG"
          docker push "$ACR_LOGIN_SERVER/acr-aca-frontend:latest"

      - name: Deploy backend Container App with internal ingress
        run: |
          BACKEND_IMAGE="$ACR_LOGIN_SERVER/acr-aca-backend:$IMAGE_TAG"
          BACKEND_APP_ID="/subscriptions/${{ vars.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ vars.AZURE_RESOURCE_GROUP }}/providers/Microsoft.App/containerApps/${{ vars.BACKEND_CONTAINER_APP }}"

          az containerapp update \
            --name "${{ vars.BACKEND_CONTAINER_APP }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "$BACKEND_IMAGE" \
            --min-replicas 0 \
            --max-replicas 1

          az containerapp ingress enable \
            --name "${{ vars.BACKEND_CONTAINER_APP }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --type internal \
            --target-port 8080 \
            --transport auto \
            --allow-insecure false

          az containerapp ingress traffic set \
            --name "${{ vars.BACKEND_CONTAINER_APP }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --revision-weight latest=100

          az resource update \
            --ids "$BACKEND_APP_ID" \
            --api-version 2025-01-01 \
            --set properties.template.scale.cooldownPeriod=1200

          BACKEND_TARGET_PORT=$(az containerapp show \
            --name "${{ vars.BACKEND_CONTAINER_APP }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query "properties.configuration.ingress.targetPort" \
            -o tsv)

          BACKEND_FQDN=$(az containerapp show \
            --name "${{ vars.BACKEND_CONTAINER_APP }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query "properties.configuration.ingress.fqdn" \
            -o tsv)

          echo "BACKEND_URL=https://$BACKEND_FQDN" >> "$GITHUB_ENV"
          echo "Backend image: $BACKEND_IMAGE"
          echo "Backend target port: $BACKEND_TARGET_PORT"
          echo "Backend internal URL: https://$BACKEND_FQDN"

      - name: Deploy frontend Container App with external ingress
        run: |
          FRONTEND_IMAGE="$ACR_LOGIN_SERVER/acr-aca-frontend:$IMAGE_TAG"

          az containerapp update \
            --name "${{ vars.FRONTEND_CONTAINER_APP }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "$FRONTEND_IMAGE" \
            --set-env-vars BACKEND_URL="$BACKEND_URL" \
            --min-replicas 1 \
            --max-replicas 1

          az containerapp ingress enable \
            --name "${{ vars.FRONTEND_CONTAINER_APP }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --type external \
            --target-port 3000 \
            --transport auto \
            --allow-insecure false

          az containerapp ingress traffic set \
            --name "${{ vars.FRONTEND_CONTAINER_APP }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --revision-weight latest=100

          FRONTEND_TARGET_PORT=$(az containerapp show \
            --name "${{ vars.FRONTEND_CONTAINER_APP }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query "properties.configuration.ingress.targetPort" \
            -o tsv)

          FRONTEND_FQDN=$(az containerapp show \
            --name "${{ vars.FRONTEND_CONTAINER_APP }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query "properties.configuration.ingress.fqdn" \
            -o tsv)

          echo "Frontend image: $FRONTEND_IMAGE"
          echo "Frontend target port: $FRONTEND_TARGET_PORT"
          echo "Frontend public URL: https://$FRONTEND_FQDN"

      - name: Print deployment summary
        run: |
          echo "Backend SHA image:  $ACR_LOGIN_SERVER/acr-aca-backend:$IMAGE_TAG"
          echo "Backend latest:     $ACR_LOGIN_SERVER/acr-aca-backend:latest"
          echo "Frontend SHA image: $ACR_LOGIN_SERVER/acr-aca-frontend:$IMAGE_TAG"
          echo "Frontend latest:    $ACR_LOGIN_SERVER/acr-aca-frontend:latest"
          echo "Backend URL used by frontend: $BACKEND_URL"
